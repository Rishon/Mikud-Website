name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun Dependencies
        uses: actions/cache@v3
        with:
          path: |
            **/node_modules
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json') }}

      - name: Install Client Dependencies
        run: bun install

      - name: Build Client
        run: bun run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt

            if [ ! -d "Mikud" ]; then
            gh repo clone Rishon/Mikud-Website Mikud
              cd Mikud
            else
              cd Mikud
              git pull origin
            fi

            bun install
            bun run build

            if ! pm2 list | grep -q "service-mikud"; then
              pm2 start npm --name "service-mikud" -- start
            else
               pm2 restart service-mikud
            fi
